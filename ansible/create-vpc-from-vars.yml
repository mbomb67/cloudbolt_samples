# create-vpc-from-vars.yml
---
- name: Create VPC from variable definitions
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    vpc_cidr: 10.0.0.0/16
    subnets:
      public:
        - { name: pub-a, cidr: 10.0.1.0/24, az: a }
        - { name: pub-b, cidr: 10.0.2.0/24, az: b }
      private:
        - { name: priv-a, cidr: 10.0.11.0/24, az: a }
        - { name: priv-b, cidr: 10.0.12.0/24, az: b }
      database:
        - { name: db-a, cidr: 10.0.21.0/24, az: a }
        - { name: db-b, cidr: 10.0.22.0/24, az: b }
  tasks:
    - name: Create VPC
      amazon.aws.ec2_vpc_net:
        name: "{{ vpc_name }}"
        cidr_block: "{{ vpc_cidr }}"
        region: "{{ aws_region }}"
        dns_support: true
        dns_hostnames: true
        tags:
          Environment: production
          ManagedBy: ansible
        state: present
      register: vpc
    - name: Create public subnets
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ item.cidr }}"
        az: "{{ aws_region }}{{ item.az }}"
        region: "{{ aws_region }}"
        map_public: true
        tags:
          Name: "{{ vpc_name }}-{{ item.name }}"
          Tier: public
          ManagedBy: ansible
      loop: "{{ subnets.public }}"
      register: public_subnets
    - name: Create private subnets
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ item.cidr }}"
        az: "{{ aws_region }}{{ item.az }}"
        region: "{{ aws_region }}"
        tags:
          Name: "{{ vpc_name }}-{{ item.name }}"
          Tier: private
          ManagedBy: ansible
      loop: "{{ subnets.private }}"
      register: private_subnets
    - name: Create database subnets
      amazon.aws.ec2_vpc_subnet:
        vpc_id: "{{ vpc.vpc.id }}"
        cidr: "{{ item.cidr }}"
        az: "{{ aws_region }}{{ item.az }}"
        region: "{{ aws_region }}"
        tags:
          Name: "{{ vpc_name }}-{{ item.name }}"
          Tier: database
          ManagedBy: ansible
      loop: "{{ subnets.database }}"
      register: database_subnets
    - name: Create internet gateway
      amazon.aws.ec2_vpc_igw:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        tags:
          Name: "{{ vpc_name }}-igw"
        state: present
      register: igw
    - name: Create public route table
      amazon.aws.ec2_vpc_route_table:
        vpc_id: "{{ vpc.vpc.id }}"
        region: "{{ aws_region }}"
        subnets: "{{ public_subnets.results | map(attribute='subnet.id') | list }}"
        routes:
          - dest: 0.0.0.0/0
            gateway_id: "{{ igw.gateway_id }}"
        tags:
          Name: "{{ vpc_name }}-public-rt"
          ManagedBy: ansible
      register: public_route_table
    - name: Show VPC summary
      ansible.builtin.debug:
        msg:
          - "VPC: {{ vpc.vpc.id }}"
          - "Public subnets: {{ public_subnets.results | map(attribute='subnet.cidr_block') | list }}"
          - "Private subnets: {{ private_subnets.results | map(attribute='subnet.cidr_block') | list }}"
          - "Database subnets: {{ database_subnets.results | map(attribute='subnet.cidr_block') | list }}"
          - "Internet Gateway: {{ igw.gateway_id }}"
          - "Public Route Table: {{ public_route_table.route_table.id }}"
    - name: Publish created resource IDs as stats for teardown
      ansible.builtin.set_stats:
        data:
          vpc_name: "{{ vpc_name }}"
          aws_region: "{{ aws_region }}"
          vpc_id: "{{ vpc.vpc.id }}"
          internet_gateway_id: "{{ igw.gateway_id }}"
          public_route_table_id: "{{ public_route_table.route_table.id }}"
          public_subnet_ids: "{{ public_subnets.results | map(attribute='subnet.cidr_block') | list }}"
          private_subnet_ids: "{{ private_subnets.results | map(attribute='subnet.cidr_block') | list }}"
          database_subnet_ids: "{{ database_subnets.results | map(attribute='subnet.cidr_block') | list }}"
        per_host: false
        aggregate: false